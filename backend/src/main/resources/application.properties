# ===============================
# SERVER CONFIGURATION
# ===============================
server.port=8080

# ===============================
# DATABASE CONFIGURATION (MySQL 8.0)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/gestion_stages_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
# Changez le mot de passe selon votre configuration WAMP/XAMPP/MySQL
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
# "update" met à jour le schéma dynamiquement. 
# Si vous préférez n'utiliser QUE votre fichier "schema.sql", mettez "none".
spring.jpa.hibernate.ddl-auto=update

# Affiche les requêtes SQL dans la console pour faciliter le débuggage
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Optionnel: initialiser la BDD avec le schema.sql au démarrage 
# spring.sql.init.mode=always

# ===============================
# JWT CONFIGURATION
# ===============================
# Clé secrète encodée (Minimum 256 bits). Utilisez celle-ci pour vos tests en local.
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
# Expiration du Token en millisecondes : 86400000 = 24 heures
jwt.expirationMs=86400000
